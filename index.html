<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador de Placas</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#007bff">
    <style>
        * { box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #f4f6f9; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-top: 0; }
        label { display: block; margin: 12px 0 5px; font-weight: bold; color: #555; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; outline: none; }
        select:focus, input:focus { border-color: #007bff; }
        .row { display: flex; gap: 10px; }
        .row div { flex: 1; }
        .btn-calc { width: 100%; background-color: #007bff; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 18px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        .btn-calc:active { background-color: #0056b3; }
        .btn-excel { width: 100%; background-color: #28a745; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 12px; cursor: pointer; display: none; }
        .btn-excel:active { background-color: #1e7e34; }
        .results { margin-top: 20px; background: #e9ecef; padding: 15px; border-radius: 8px; display: none; }
        .results p { margin: 8px 0; font-size: 16px; color: #333; }
        .highlight { font-weight: bold; color: #007bff; font-size: 18px; }
        .highlight-round { font-weight: bold; color: #28a745; font-size: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Cotizador de Placas</h2>
    
    <label for="placa">Espesor de Placa:</label>
    <select id="placa" onchange="limpiarResultados()">
        <option value="1250">1/16 pulgada ($1,250)</option>
        <option value="2500">1/8 pulgada ($2,500)</option>
        <option value="3750">3/16 pulgada ($3,750)</option>
        <option value="5000">1/4 pulgada ($5,000)</option>
        <option value="6250">5/16 pulgada ($6,250)</option>
        <option value="7500">3/8 pulgada ($7,500)</option>
        <option value="8750">7/16 pulgada ($8,750)</option>
        <option value="10000">1/2 pulgada ($10,000)</option>
        <option value="11250">9/16 pulgada ($11,250)</option>
        <option value="12500">5/8 pulgada ($12,500)</option>
        <option value="13750">11/16 pulgada ($13,750)</option>
        <option value="15000">3/4 pulgada ($15,000)</option>
        <option value="16250">13/16 pulgada ($16,250)</option>
        <option value="17500">7/8 pulgada ($17,500)</option>
        <option value="18750">15/16 pulgada ($18,750)</option>
        <option value="20000">1 pulgada ($20,000)</option>
    </select>

    <div class="row">
        <div>
            <label for="largo">Largo (metros):</label>
            <input type="number" id="largo" step="0.01" placeholder="ej. 2.0" oninput="limpiarResultados()">
        </div>
        <div>
            <label for="ancho">Ancho (metros):</label>
            <input type="number" id="ancho" step="0.01" placeholder="ej. 5.7" oninput="limpiarResultados()">
        </div>
    </div>

    <button class="btn-calc" onclick="calcularCotizacion()">Calcular Precio</button>

    <div id="results" class="results">
        <p>Área Solicitada: <span id="resArea" style="font-weight:bold;">0</span> m²</p>
        <p>Precio Exacto (x2): <span id="resPrecio" class="highlight">$0.00</span></p>
        <p>Con Redondeo: <span id="resRedondeado" class="highlight-round">$0.00</span></p>
        
        <button class="btn-excel" id="btnExcel" onclick="descargarExcel()">Descargar Nota Excel</button>
    </div>
</div>

<script>
    const AREA_HOJA_ESTANDAR = 3.721; 
    let datosUltimaCotizacion = null;

    function calcularCotizacion() {
        const selectPlaca = document.getElementById('placa');
        const nombrePlaca = selectPlaca.options[selectPlaca.selectedIndex].text.split(' ($')[0];
        const precioHoja = parseFloat(selectPlaca.value);
        const largo = parseFloat(document.getElementById('largo').value);
        const ancho = parseFloat(document.getElementById('ancho').value);

        if (isNaN(largo) || isNaN(ancho) || largo <= 0 || ancho <= 0) {
            alert("Por favor, ingresa medidas válidas.");
            return;
        }

        const areaCliente = largo * ancho;
        const costoBasePieza = (precioHoja / AREA_HOJA_ESTANDAR) * areaCliente;
        const precioFinal = costoBasePieza * 2;
        const precioRedondeado = Math.round(precioFinal);

        document.getElementById('resArea').innerText = areaCliente.toFixed(3);
        document.getElementById('resPrecio').innerText = "$" + precioFinal.toLocaleString('es-MX', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('resRedondeado').innerText = "$" + precioRedondeado.toLocaleString('es-MX', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        
        datosUltimaCotizacion = {
            concepto: "Placa de " + nombrePlaca,
            largo: largo.toFixed(2) + " m",
            ancho: ancho.toFixed(2) + " m",
            area: areaCliente.toFixed(3) + " m2",
            precioExacto: precioFinal.toFixed(2),
            precioRedondeado: precioRedondeado
        };

        document.getElementById('results').style.display = 'block';
        document.getElementById('btnExcel').style.display = 'block';
    }

    function limpiarResultados() {
        document.getElementById('results').style.display = 'none';
        document.getElementById('btnExcel').style.display = 'none';
    }

    function descargarExcel() {
        if (!datosUltimaCotizacion) return;

        // Formato CSV compatible con Excel en Español (usando punto y coma ';')
        let csvContent = "\uFEFF"; 
        csvContent += "NOTA DE COTIZACIÓN\n";
        csvContent += "Fecha:;" + new Date().toLocaleDateString('es-MX') + "\n\n";
        
        csvContent += "Concepto;Largo;Ancho;Área Total;Precio Exacto;Total Redondeado\n";
        csvContent += `${datosUltimaCotizacion.concepto};${datosUltimaCotizacion.largo};${datosUltimaCotizacion.ancho};${datosUltimaCotizacion.area};$${datosUltimaCotizacion.precioExacto};$${datosUltimaCotizacion.precioRedondeado}\n\n`;
        
        csvContent += ";;;;TOTAL A PAGAR:;$" + datosUltimaCotizacion.precioRedondeado + "\n";

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        
        link.setAttribute("href", url);
        link.setAttribute("download", `Cotizacion_${Date.now()}.csv`);
        document.body.appendChild(link);
        
        link.click();
        document.body.removeChild(link);
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker registrado con éxito', reg))
                .catch(err => console.error('Error al registrar el Service Worker', err));
        });
    }
</script>

</body>
</html>
