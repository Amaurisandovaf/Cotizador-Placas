<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador de Placas</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#007bff">
    <style>
        * { box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #f4f6f9; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 12px; width: 100%; max-width: 460px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-top: 0; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
        label { display: block; margin: 12px 0 5px; font-weight: bold; color: #555; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; outline: none; }
        select:focus, input:focus { border-color: #007bff; }
        .row { display: flex; gap: 10px; }
        .row div { flex: 1; }
        
        .btn-add { width: 100%; background-color: #007bff; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .btn-add:active { background-color: #0056b3; }
        
        .btn-reset { width: 100%; background-color: #dc3545; color: white; border: none; padding: 10px; border-radius: 8px; font-size: 14px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .btn-reset:active { background-color: #bd2130; }

        .btn-excel { width: 100%; background-color: #28a745; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .btn-excel:active { background-color: #1e7e34; }

        /* Lista de productos agregados */
        .tabla-items { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        .tabla-items th, .tabla-items td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .tabla-items th { background-color: #f8f9fa; color: #333; }

        .results { margin-top: 25px; background: #e9ecef; padding: 15px; border-radius: 8px; display: none; }
        .results p { margin: 8px 0; font-size: 16px; color: #333; border-bottom: 1px dashed #ccc; padding-bottom: 5px; }
        .results p:last-of-type { border-bottom: none; }
        .val { float: right; font-weight: bold; }
        .highlight { color: #007bff; }
        .highlight-round { color: #28a745; font-size: 18px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Cotizador de Placas</h2>
    <div class="subtitle">Agrega las piezas que necesites a la nota</div>
    
    <label for="placa">Espesor de Placa:</label>
    <select id="placa">
        <option value="1250" data-pulgadas="0.0625">1/16 pulgada ($1,250)</option>
        <option value="2500" data-pulgadas="0.125">1/8 pulgada ($2,500)</option>
        <option value="3750" data-pulgadas="0.1875">3/16 pulgada ($3,750)</option>
        <option value="5000" data-pulgadas="0.25">1/4 pulgada ($5,000)</option>
        <option value="6250" data-pulgadas="0.3125">5/16 pulgada ($6,250)</option>
        <option value="7500" data-pulgadas="0.375">3/8 pulgada ($7,500)</option>
        <option value="8750" data-pulgadas="0.4375">7/16 pulgada ($8,750)</option>
        <option value="10000" data-pulgadas="0.5">1/2 pulgada ($10,000)</option>
        <option value="11250" data-pulgadas="0.5625">9/16 pulgada ($11,250)</option>
        <option value="12500" data-pulgadas="0.625">5/8 pulgada ($12,500)</option>
        <option value="13750" data-pulgadas="0.6875">11/16 pulgada ($13,750)</option>
        <option value="15000" data-pulgadas="0.75">3/4 pulgada ($15,000)</option>
        <option value="16250" data-pulgadas="0.8125">13/16 pulgada ($16,250)</option>
        <option value="17500" data-pulgadas="0.875">7/8 pulgada ($17,500)</option>
        <option value="18750" data-pulgadas="0.9375">15/16 pulgada ($18,750)</option>
        <option value="20000" data-pulgadas="1.0">1 pulgada ($20,000)</option>
    </select>

    <div class="row">
        <div>
            <label for="largo">Largo (metros):</label>
            <input type="number" id="largo" step="0.01" placeholder="ej. 2.0">
        </div>
        <div>
            <label for="ancho">Ancho (metros):</label>
            <input type="number" id="ancho" step="0.01" placeholder="ej. 1.2">
        </div>
    </div>

    <label for="cantidad">Cantidad:</label>
    <input type="number" id="cantidad" value="1" min="1" step="1">

    <button class="btn-add" onclick="agregarPlaca()">+ Agregar a la Cotización</button>

    <div id="results" class="results">
        <h3>Piezas en la nota:</h3>
        <table class="tabla-items">
            <thead>
                <tr>
                    <th>Espesor</th>
                    <th>Dim. (m)</th>
                    <th>Cant</th>
                    <th>Total Rec.</th>
                </tr>
            </thead>
            <tbody id="listaItems">
                </tbody>
        </table>

        <br>
        <p>Peso Est. Total: <span id="resPeso" class="val" style="color:#e67e22;">0.00 kg</span></p>
        <p>Precio Neto Total: <span id="resPrecio" class="val highlight">$0.00</span></p>
        <p>Precio con IVA (16%): <span id="resIva" class="val">$0.00</span></p>
        <p>Total Redondeado + IVA: <span id="resRedondeado" class="val highlight-round">$0.00</span></p>
        
        <button class="btn-excel" onclick="descargarExcel()">Descargar Nota Excel</button>
        <button class="btn-reset" onclick="reiniciarProceso()">🗑️ Limpiar / Nueva Cotización</button>
    </div>
</div>

<script>
    const AREA_HOJA_ESTANDAR = 3.721; 
    const CONSTANTE_PESO_ACERO = 50.28; 
    
    // Lista global donde se guardarán todas las partidas agregadas
    let listaCotizaciones = [];

    function agregarPlaca() {
        const selectPlaca = document.getElementById('placa');
        const opcionSeleccionada = selectPlaca.options[selectPlaca.selectedIndex];
        
        const nombrePlaca = opcionSeleccionada.text.split(' ($')[0];
        const precioHoja = parseFloat(opcionSeleccionada.value);
        const pulgadas = parseFloat(opcionSeleccionada.getAttribute('data-pulgadas'));
        
        const largo = parseFloat(document.getElementById('largo').value);
        const ancho = parseFloat(document.getElementById('ancho').value);
        const cantidad = parseInt(document.getElementById('cantidad').value);

        if (isNaN(largo) || isNaN(ancho) || largo <= 0 || ancho <= 0 || isNaN(cantidad) || cantidad <= 0) {
            alert("Por favor, ingresa medidas y cantidades válidas antes de agregar.");
            return;
        }

        // 1. Cálculos unitarios y totales de esta partida
        const areaPieza = largo * ancho;
        const pesoUnitario = areaPieza * pulgadas * CONSTANTE_PESO_ACERO;
        const pesoTotalPartida = pesoUnitario * cantidad;

        const costoBasePieza = (precioHoja / AREA_HOJA_ESTANDAR) * areaPieza;
        const precioNetoPartida = (costoBasePieza * 2) * cantidad;
        const precioConIvaPartida = precioNetoPartida * 1.16;
        const precioRedondeadoPartida = Math.round(precioConIvaPartida);

        // 2. Guardar objeto en nuestro arreglo global
        listaCotizaciones.push({
            concepto: "Placa de " + nombrePlaca,
            cantidad: cantidad,
            largo: largo.toFixed(2) + " m",
            ancho: ancho.toFixed(2) + " m",
            area: (areaPieza * cantidad).toFixed(3) + " m2",
            peso: pesoTotalPartida,
            precioNeto: precioNetoPartida,
            precioConIva: precioConIvaPartida,
            precioRedondeado: precioRedondeadoPartida
        });

        // 3. Limpiar los campos de medidas para la siguiente placa
        document.getElementById('largo').value = "";
        document.getElementById('ancho').value = "";
        document.getElementById('cantidad').value = "1";

        // 4. Actualizar la interfaz
        renderizarInterfaz();
    }

    function renderizarInterfaz() {
        const tabla = document.getElementById('listaItems');
        tabla.innerHTML = ""; // Limpiar tabla anterior

        let acumuladoPeso = 0;
        let acumuladoNeto = 0;
        let acumuladoIva = 0;
        let acumuladoRedondeado = 0;

        // Recorrer los productos en la cotización y sumarlos
        listaCotizaciones.forEach((item) => {
            acumuladoPeso += item.peso;
            acumuladoNeto += item.precioNeto;
            acumuladoIva += item.precioConIva;
            acumuladoRedondeado += item.precioRedondeado;

            // Insertar fila visual
            const fila = document.createElement('tr');
            fila.innerHTML = `
                <td>${item.concepto}</td>
                <td>${item.largo} x ${item.ancho}</td>
                <td>${item.cantidad}</td>
                <td><strong>$${item.precioRedondeado.toLocaleString('es-MX')}</strong></td>
            `;
            tabla.appendChild(fila);
        });

        // Mostrar sumatorias finales
        document.getElementById('resPeso').innerText = acumuladoPeso.toFixed(2) + " kg";
        document.getElementById('resPrecio').innerText = "$" + acumuladoNeto.toLocaleString('es-MX', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('resIva').innerText = "$" + acumuladoIva.toLocaleString('es-MX', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('resRedondeado').innerText = "$" + acumuladoRedondeado.toLocaleString('es-MX', {minimumFractionDigits: 2, maximumFractionDigits: 2});

        // Hacer visible la sección de resultados si hay elementos
        document.getElementById('results').style.display = listaCotizaciones.length > 0 ? 'block' : 'none';
    }

    function reiniciarProceso() {
        if(confirm("¿Estás seguro de que quieres borrar la cotización actual y empezar de cero?")) {
            listaCotizaciones = [];
            renderizarInterfaz();
        }
    }

    function descargarExcel() {
        if (listaCotizaciones.length === 0) return;

        let csvContent = "\uFEFF"; 
        csvContent += "NOTA DE COTIZACIÓN DE MATERIALES\n";
        csvContent += "Fecha:;" + new Date().toLocaleDateString('es-MX') + "\n\n";
        
        // Encabezados de la tabla Excel
        csvContent += "Concepto;Cant;Largo;Ancho;Área Total;Peso Est. Total;Precio Neto;Precio + IVA;Total Redondeado\n";
        
        let totalNetoGlobal = 0;
        let totalIvaGlobal = 0;
        let totalRedondeadoGlobal = 0;

        // Escribir fila por fila cada material cotizado
        listaCotizaciones.forEach((item) => {
            totalNetoGlobal += item.precioNeto;
            totalIvaGlobal += item.precioConIva;
            totalRedondeadoGlobal += item.precioRedondeado;

            csvContent += `${item.concepto};${item.cantidad};${item.largo};${item.ancho};${item.area};${item.peso.toFixed(2)} kg;$${item.precioNeto.toFixed(2)};$${item.precioConIva.toFixed(2)};$${item.precioRedondeado}\n`;
        });
        
        // Agregar las filas de resumen al final del Excel
        csvContent += `\n;;;;;;;TOTAL NETO:;$${totalNetoGlobal.toFixed(2)}\n`;
        csvContent += `;;;;;;;TOTAL CON IVA:;$${totalIvaGlobal.toFixed(2)}\n`;
        csvContent += `;;;;;;;TOTAL A COBRAR (REDONDEADO):;$${totalRedondeadoGlobal}\n`;

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        
        link.setAttribute("href", url);
        link.setAttribute("download", `Cotizacion_Multiple_${Date.now()}.csv`);
        document.body.appendChild(link);
        
        link.click();
        document.body.removeChild(link);
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker registrado', reg))
                .catch(err => console.error('Error Service Worker', err));
        });
    }
</script>

</body>
</html>
